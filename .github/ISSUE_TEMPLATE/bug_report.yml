name: Bug Report
description: Report a crash, regression, or unexpected behavior in the Flixr iOS app
title: "[Bug] "
labels: ["type:bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app
        2. Navigate to...
        3. See error
    validations:
      required: true
  - type: input
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Crash / Data loss
        - Broken feature
        - Visual glitch
        - Minor
    validations:
      required: true
  - type: dropdown
    id: ios_version
    attributes:
      label: iOS version
      options:
        - iOS 18
        - iOS 17
        - iOS 16
        - Other
    validations:
      required: true
  - type: input
    id: build
    attributes:
      label: Build number
      placeholder: "e.g. 202605191737"
