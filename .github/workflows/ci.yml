# Unit tests are run by Xcode Cloud, not GitHub Actions.
# See ci_scripts/ci_post_clone.sh for the post-clone hook that installs CocoaPods.
# Configure the Xcode Cloud workflow in App Store Connect → Xcode Cloud.
name: CI

on:
  pull_request:
    branches: [main, develop]

jobs:
  placeholder:
    name: "CI (Xcode Cloud)"
    runs-on: ubuntu-latest
    steps:
      - name: Tests run on Xcode Cloud
        run: echo "Unit tests are handled by Xcode Cloud. See App Store Connect for build status."
