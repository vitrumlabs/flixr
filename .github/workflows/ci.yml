name: CI

on:
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: "Unit Tests"
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: Pods
          key: pods-${{ hashFiles('Podfile.lock') }}
          restore-keys: pods-

      - name: Install CocoaPods dependencies
        run: pod install --repo-update

      - name: Select simulator
        run: |
          find_sim() {
            xcrun simctl list -j | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          installed = {r['identifier'] for r in data.get('runtimes', []) if r.get('isAvailable', False)}
          for rt in sorted(installed, reverse=True):
            for dev in data.get('devices', {}).get(rt, []):
              if 'iPhone' in dev.get('name', '') and dev.get('isAvailable', False):
                print(dev['udid']); exit(0)
          exit(1)
          "
          }
          UDID=$(find_sim) || {
            echo "No installed runtime found — downloading iOS platform..."
            xcodebuild -downloadPlatform iOS
            UDID=$(find_sim)
          }
          echo "SIM_UDID=$UDID" >> "$GITHUB_ENV"

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild test \
            -workspace flixr.xcworkspace \
            -scheme flixr \
            -destination "id=$SIM_UDID" \
            -only-testing:flixrTests \
            -resultBundlePath TestResults \
            | xcpretty --color
        env:
          NSUnbufferedIO: YES
