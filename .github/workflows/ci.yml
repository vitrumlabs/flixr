name: CI

on:
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: "Unit Tests"
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: Pods
          key: pods-${{ hashFiles('Podfile.lock') }}
          restore-keys: pods-

      - name: Install CocoaPods dependencies
        run: pod install --repo-update

      - name: Select simulator
        run: |
          UDID=$(xcrun simctl list -j devices available | python3 -c "
          import sys, json
          d = json.load(sys.stdin)['devices']
          for runtime in sorted(d.keys(), reverse=True):
            for dev in d[runtime]:
              if 'iPhone' in dev.get('name','') and dev.get('isAvailable', False):
                print(dev['udid'])
                exit()
          ")
          echo "SIM_UDID=$UDID" >> "$GITHUB_ENV"

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild test \
            -workspace flixr.xcworkspace \
            -scheme flixr \
            -destination "id=$SIM_UDID" \
            -only-testing:flixrTests \
            -resultBundlePath TestResults \
            | xcpretty --color
        env:
          NSUnbufferedIO: YES
